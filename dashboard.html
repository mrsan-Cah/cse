<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
 

    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
    <div class="dashboard-container">
        <h3 class="text-center">Welcome, <span id="userName"></span></h3>
        <p class="text-center">Phone: <span id="userPhone"></span></p>
        <button class="btn btn-primary w-100" onclick="goToHome()">Go to Home</button>
        <button class="btn btn-danger w-100 mt-2" onclick="logout()">Logout</button>
    </div>
</div>

<script>
    let user = JSON.parse(localStorage.getItem("loggedInUser"));

    if (!user) {
        alert("Please login first!");
        window.location.href = "login.html";
    } else {
        document.getElementById("userName").innerText = user.name;
        document.getElementById("userPhone").innerText = user.phone;
    }

    function goToHome() {
        window.location.href = "index.html";
    }

    function logout() {
        localStorage.removeItem("loggedInUser");
        window.location.href = "login.html";
    }
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

</body>
</html>
